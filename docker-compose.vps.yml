services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 8

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_BIND_IP:-127.0.0.1}:${PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      PORT: ${PORT:-4000}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      UPLOAD_DIR: uploads
      CORS_ORIGIN: ${CORS_ORIGIN}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-300}
      KHALTI_SECRET_KEY: ${KHALTI_SECRET_KEY}
      KHALTI_PUBLIC_KEY: ${KHALTI_PUBLIC_KEY}
      KHALTI_RETURN_URL: ${KHALTI_RETURN_URL}
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL}
    command: sh -c "npm run migrate && npm start"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6

volumes:
  pgdata:
  uploads_data:
